# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/prueba?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
app.jwt.secret=123456789101112131415161718192021
app.jwt.expiration-ms=86400000

# QR
app.qr.expiration-minutes=30
app.qr.size=300

# Logs
logging.level.root=WARN
logging.level.com.proyecto=INFO
# Configuracion de subida de documentos PDF
app.upload.dir=uploads/documentos
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB